<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="-2" dy="5" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" fill="transparent"/>
  <g transform="translate(48, 45)">
    
    <!-- 1st Shape (Bottom/Left) -->
    <g filter="url(#glow)">
       <!-- Extrusion Left Side -->
       <polygon points="-30,0 -10,20 -10,28 -30,8" fill="#172554"/>
       <!-- Extrusion Right Side -->
       <polygon points="-10,20 10,0 10,8 -10,28" fill="#1e3a8a"/>
       <!-- Top Face -->
       <polygon points="-30,0 -10,-20 10,0 -10,20" fill="url(#bg1)"/>
       <!-- Highlight -->
       <polyline points="-30,0 -10,-20 10,0" fill="none" stroke="url(#edge)" stroke-width="0.75"/>
    </g>

    <!-- 2nd Shape (Middle) -->
    <g filter="url(#glow)">
       <polygon points="-10,0 10,20 10,28 -10,8" fill="#1e3a8a"/>
       <polygon points="10,20 30,0 30,8 10,28" fill="#1d4ed8"/>
       <polygon points="-10,0 10,-20 30,0 10,20" fill="url(#bg2)"/>
       <polyline points="-10,0 10,-20 30,0" fill="none" stroke="url(#edge)" stroke-width="0.75"/>
    </g>

    <!-- 3rd Shape (Top/Right) -->
    <g filter="url(#glow)">
       <polygon points="10,0 30,20 30,28 10,8" fill="#1d4ed8"/>
       <polygon points="30,20 50,0 50,8 30,28" fill="#2563eb"/>
       <polygon points="10,0 30,-20 50,0 30,20" fill="url(#bg3)"/>
       <polyline points="10,0 30,-20 50,0" fill="none" stroke="url(#edge)" stroke-width="0.75"/>
    </g>

  </g>
</svg>
