<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="70%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    
    <!-- Emerald Glow Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    
    <!-- Neon Drop Shadow -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Ambient Shadow for depth -->
    <filter id="ambientShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Squircle Base with premium dark border -->
  <rect x="12" y="12" width="488" height="488" rx="110" fill="url(#bgGlow)" stroke="#1e293b" stroke-width="12"/>
  
  <!-- Subtle futuristic outer ring -->
  <rect x="28" y="28" width="456" height="456" rx="98" fill="none" stroke="#334155" stroke-dasharray="10 15" stroke-opacity="0.25" stroke-width="3" />

  <!-- Ambient background accent circles -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#10b981" stroke-opacity="0.04" stroke-width="20" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="#f59e0b" stroke-opacity="0.03" stroke-width="10" />

  <!-- The "V" and premium vehicle/wing combination -->
  <g filter="url(#ambientShadow)">
    
    <!-- Outer Wing Wingspan / V-shape structure -->
    <path d="M 90,140 
             L 220,380 
             A 40,40 0 0,0 292,380 
             L 422,140 
             L 370,140 
             L 256,345 
             L 142,140 
             Z" 
          fill="url(#emeraldGrad)" 
          filter="url(#neonGlow)" />
          
    <!-- Inner glowing Gold Blade / Core V -->
    <path d="M 160,180 
             L 240,330 
             A 20,20 0 0,0 272,330 
             L 352,180 
             L 320,180 
             L 256,300 
             L 192,180 
             Z" 
          fill="url(#goldGrad)" />
          
    <!-- Sleek High-End Car Silhouette / Jet Core at the center -->
    <path d="M 210,240 
             C 210,200, 302,200, 302,240 
             L 308,260 
             C 320,265, 320,285, 300,290 
             L 212,290 
             C 192,285, 192,265, 204,260 
             Z" 
          fill="#020617" 
          stroke="url(#goldGrad)" 
          stroke-width="5" />
          
    <!-- Glowing Headlights / Core Accents -->
    <circle cx="225" cy="275" r="5" fill="#fef08a" filter="url(#neonGlow)" />
    <circle cx="287" cy="275" r="5" fill="#fef08a" filter="url(#neonGlow)" />
    <path d="M 240,250 L 272,250" stroke="#34d399" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Subtle bottom label placeholder accent -->
  <text x="256" y="445" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="24" font-weight="800" letter-spacing="8" text-anchor="middle" font-style="normal" opacity="0.8">
    VBOOKING
  </text>
  
  <!-- Corner metallic highlight -->
  <path d="M 60,35 Q 35,35 35,60" fill="none" stroke="#fef08a" stroke-width="4" stroke-linecap="round" opacity="0.3" />
</svg>
