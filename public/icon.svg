<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for Premium Glassmorphic Contrast -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    
    <!-- Exact Sanken Overseas Blue Gradient -->
    <linearGradient id="sankenBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="40%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Glowing Blue Spotlight under the logo for dramatic contrast -->
    <radialGradient id="spotlightGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Neon Drop Shadow for high-end look -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Ambient Shadow for realistic depth -->
    <filter id="ambientShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Squircle Base with premium dark border, optimized for phone launch screens -->
  <rect x="12" y="12" width="488" height="488" rx="114" fill="url(#bgGlow)" stroke="#1e293b" stroke-width="12"/>
  
  <!-- Sleek concentric technical frame rings -->
  <rect x="28" y="28" width="456" height="456" rx="100" fill="none" stroke="#475569" stroke-dasharray="14 14" stroke-opacity="0.15" stroke-width="2.5" />
  <circle cx="256" cy="256" r="195" fill="none" stroke="#0ea5e9" stroke-opacity="0.05" stroke-width="1.5" />

  <!-- Ambient blue spotlight directly behind the logo -->
  <circle cx="256" cy="256" r="210" fill="url(#spotlightGlow)"/>

  <!-- Centered Sanken Overseas Brand Triple Diamonds Symbol (Without Text) -->
  <g filter="url(#ambientShadow)">
    <g transform="translate(37.6, 46) scale(4.2)">
      <!-- Diamond 1 (Leftmost / Bottom layer) -->
      <rect 
        x="12" 
        y="30" 
        width="40" 
        height="40" 
        rx="5.5" 
        transform="rotate(45 32 50)" 
        fill="url(#sankenBlueGrad)" 
        stroke="#ffffff" 
        stroke-width="1.8" 
        opacity="0.80" 
      />
      
      <!-- Diamond 2 (Middle) -->
      <rect 
        x="32" 
        y="30" 
        width="40" 
        height="40" 
        rx="5.5" 
        transform="rotate(45 52 50)" 
        fill="url(#sankenBlueGrad)" 
        stroke="#ffffff" 
        stroke-width="1.8" 
        opacity="0.85" 
      />
      
      <!-- Diamond 3 (Rightmost / Top layer) -->
      <rect 
        x="52" 
        y="30" 
        width="40" 
        height="40" 
        rx="5.5" 
        transform="rotate(45 72 50)" 
        fill="url(#sankenBlueGrad)" 
        stroke="#ffffff" 
        stroke-width="1.8" 
        opacity="0.95" 
      />
    </g>
  </g>
  
  <!-- Dynamic, modern edge metallic light reflections -->
  <path d="M 70,35 Q 35,35 35,70" fill="none" stroke="#38bdf8" stroke-width="4.5" stroke-linecap="round" opacity="0.4" />
</svg>
